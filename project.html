<script>
function getParam(name) {
  const url = new URLSearchParams(window.location.search);
  return url.get(name);
}

const id = parseInt(getParam('id'), 10);
const p = PROJECTS.find(x => x.id === id);

if (!p) {
  document.getElementById('detailHeroContent').innerHTML = '<h1 style="color:var(--text-primary)">Projet introuvable.</h1>';
} else {
  document.title = p.title + ' — Tom Muller';
  const statusClass = p.status === 'active' ? 'status-active' : p.status === 'wip' ? 'status-wip' : 'status-done';

  document.getElementById('detailHeroContent').innerHTML = `
    <span class="project-card-category">${p.category}</span>
    <h1 class="detail-title">${p.title}</h1>
    <div class="detail-meta">
      <span class="detail-meta-item"><span>📅</span>${p.year}</span>
      <span class="detail-meta-item"><span>🏢</span>${p.context}</span>
      <span class="detail-meta-item project-card-status ${statusClass}">
        <span class="status-dot"></span>${p.statusLabel}
      </span>
    </div>
    <p style="font-size:1.05rem;color:var(--text-secondary);max-width:680px;line-height:1.7;">${p.shortDesc}</p>
  `;

  const imgMain = document.getElementById('detailImgMain');
  if (p.image) {
    imgMain.innerHTML = `<img src="${p.image}" alt="${p.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=img-placeholder style=height:100%;border-radius:var(--radius-xl);border:none><span class=icon style=font-size:3rem>📁</span><span>${p.title}</span></div>'"/>`;
  }

  const featuresHtml = p.features.map(f => '<li>' + f + '</li>').join('');
  document.getElementById('detailBody').innerHTML = `
    <h2>Description du projet</h2>
    <p>${p.fullDesc}</p>
    <h2>Fonctionnalités principales</h2>
    <ul>${featuresHtml}</ul>
  `;

  const tc = document.getElementById('tagsContainer');
  p.tags.forEach(t => { tc.innerHTML += '<span class="tag">' + t + '</span>'; });

  const ic = document.getElementById('infoContainer');
  ic.innerHTML = `
    <div><strong style="color:var(--text-primary);">Année :</strong> ${p.year}</div>
    <div><strong style="color:var(--text-primary);">Contexte :</strong> ${p.context}</div>
    <div><strong style="color:var(--text-primary);">Catégorie :</strong> ${p.category}</div>
    <div><strong style="color:var(--text-primary);">Statut :</strong> ${p.statusLabel}</div>
  `;

  const lc = document.getElementById('linksContainer');
  const sl = document.getElementById('sidebarLinks');
  let linksHtml = '';
  if (p.links.github) {
    linksHtml += '<a href="' + p.links.github + '" target="_blank" rel="noopener" class="btn btn-ghost btn-sm" style="justify-content:center;">GitHub →</a>';
  }
  if (p.links.demo) {
    linksHtml += '<a href="' + p.links.demo + '" target="_blank" rel="noopener" class="btn btn-outline btn-sm" style="justify-content:center;">Démo live →</a>';
  }
  if (linksHtml) {
    lc.innerHTML = linksHtml;
  } else {
    sl.style.display = 'none';
  }

  const idx = PROJECTS.findIndex(x => x.id === id);
  const prev = PROJECTS[idx - 1];
  const next = PROJECTS[idx + 1];
  let navHtml = '';
  if (prev) navHtml += `<a href="project.html?id=${prev.id}" class="nav-detail-btn prev"><small>← Précédent</small><strong>${prev.title}</strong></a>`;
  if (next) navHtml += `<a href="project.html?id=${next.id}" class="nav-detail-btn next"><small>Suivant →</small><strong>${next.title}</strong></a>`;
  document.getElementById('navDetail').innerHTML = navHtml;
}
</script>
